# fly.toml app configuration for random-telegram-bot
# Документация: https://fly.io/docs/reference/configuration/

app = "random-telegram-bot"
primary_region = "lhr"

[build]

[env]
  RUST_LOG = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
